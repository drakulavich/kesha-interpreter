name: ar-en-simul

services:
  riva-asr:
    image: nvcr.io/nim/nvidia/parakeet-1-1b-rnnt-multilingual:latest
    container_name: riva-asr
    restart: unless-stopped
    environment:
      - NGC_API_KEY=${NGC_API_KEY:?set NGC_API_KEY in .env}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - NIM_TAGS_SELECTOR=${ASR_SELECTOR:-mode=all,type=prompt,vad=silero}
    ports:
      - "50055:50051"
      - "9021:9000"
    volumes:
      - /soot/anton.yakutovich/nim_cache_asr:/opt/nim/.cache
    shm_size: "8gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/v1/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 15m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["3"]

  riva-tts:
    image: nvcr.io/nim/nvidia/magpie-tts-multilingual:latest
    container_name: riva-tts
    restart: unless-stopped
    environment:
      - NGC_API_KEY=${NGC_API_KEY:?set NGC_API_KEY in .env}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
    ports:
      - "50056:50051"
      - "9022:9000"
    volumes:
      - /soot/anton.yakutovich/nim_cache_tts:/opt/nim/.cache
    shm_size: "8gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/v1/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 15m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["1"]

  riva-nmt:
    image: nvcr.io/nim/nvidia/riva-translate-1_6b:latest
    container_name: riva-nmt
    restart: unless-stopped
    environment:
      - NGC_API_KEY=${NGC_API_KEY:?set NGC_API_KEY in .env}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - RIVA_ASR_URL=riva-asr:50051
      - RIVA_TTS_URL=riva-tts:50051
    ports:
      - "50051:50051"
      - "9010:9000"
    volumes:
      - /soot/anton.yakutovich/nim_cache_nmt:/opt/nim/.cache
    shm_size: "8gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/v1/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 15m
    depends_on:
      riva-asr:
        condition: service_healthy
      riva-tts:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["6"]
